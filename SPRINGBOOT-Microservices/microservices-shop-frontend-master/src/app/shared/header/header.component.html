<nav class="rounded border border-gray-200 bg-white px-2 py-2.5 shadow sm:px-4">
    <div class="container flex flex-wrap justify-between items-center mx-auto">
        <a href="/" class="flex items-center">
      <span class="self-center whitespace-nowrap text-xl font-semibold text-gray-900">
        Spring Boot Microservices Shop
      </span>
        </a>

        <div class="flex items-center">
            <button
                    id="menu-toggle"
                    type="button"
                    (click)="toggleMenu()"
                    class="ml-3 inline-flex items-center rounded-lg p-2 text-sm text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 md:hidden"
            >
                <span class="sr-only">Open main menu</span>
                <!-- Hamburger icon -->
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7"
                    />
                </svg>
            </button>
        </div>

        <div
                class="w-full md:block md:w-auto"
                [class.hidden]="!menuOpen"
                id="mobile-menu"
        >
            <ul class="flex flex-col mt-4 md:flex-row md:space-x-8 md:mt-0 md:text-sm md:font-medium">
                <li>
                    @if (isAuthenticated) {
                      <p class="mb-1 text-gray-700">Hi {{ username || 'User' }}</p>
                      <a
                        (click)="logout()"
                        class="nav-link cursor-pointer">
                        Logout
                      </a>
                    } @else {
                      <a
                        (click)="login()"
                        class="nav-link cursor-pointer">
                        Login
                      </a>
                    }
                </li>
            </ul>
        </div>

    </div>
</nav>
