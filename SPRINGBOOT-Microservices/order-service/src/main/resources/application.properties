spring.application.name=order-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/order_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Shlok@sql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Inventory Service Configuration
inventory.service.url=http://localhost:8082

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.observation-enabled=true

server.port=8081

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Observability and Management
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.observations.key-values.application=order-service
management.tracing.enabled=true
management.tracing.service-name=order-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.metrics.distribution.percentiles-histogram.http.server.requests=true
loki.url=http://localhost:3100/loki/api/v1/push